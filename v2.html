const SLOTS={

function filterMeals(pr){
  return M.filter(m=>{
    if(pr.dietType==='vegetarian'){if(!m.v)return false;if(m.e&&pr.eggPref==='no-egg')return false;}
    if(pr.dietType==='eggetarian'){if(!m.v&&!m.e)return false;}
    if(!pr.dairyOk&&m.dairy)return false;
    if(!pr.soyOk&&m.soy)return false;
    if(pr.cuisines.length>0&&!pr.cuisines.includes('mixed')){if(!pr.cuisines.includes(m.c))return false;}
    return true;
  });
}

function scoreM(m,tc,tp,favs){
  // Protein-first scoring: protein match weighted 60%, calories 40%
  const cd=Math.abs(m.cal-tc)/Math.max(tc,1);
  const pd=Math.abs(m.p-tp)/Math.max(tp,1);
  let s=cd*.40+pd*.60;
  if(favs.has(m.id))s*=.85;
  // Bonus for high-protein meals when protein target is high
  if(tp>20&&m.p>=tp*.8)s*=.8;
  return s;
}

function genDay(pr,favs=new Set(),excl=new Set()){
  const fm=filterMeals(pr);
  const slots=SLOTS[pr.numMeals]||SLOTS[4];
  const plan=[];const used=new Set(excl);
  let remCal=pr.calorieTarget,remProt=pr.proteinTarget;
  for(let i=0;i<slots.length;i++){
    const slot=slots[i],isLast=i===slots.length-1;
    let cands=fm.filter(m=>m.t.some(t=>slot.types.includes(t))&&!used.has(m.id));
    if(!cands.length)cands=fm.filter(m=>!used.has(m.id));
    if(!cands.length)cands=fm;
    const tc=isLast?Math.max(remCal,100):pr.calorieTarget*slot.calPct;
    const tp=isLast?Math.max(remProt,5):pr.proteinTarget*slot.protPct;
    const scored=cands.map(m=>({m,s:scoreM(m,tc,tp,favs)})).sort((a,b)=>a.s-b.s);
    const topN=Math.min(5,scored.length);
    const pick=scored[Math.floor(Math.random()*topN)].m;
    plan.push({...pick,slotKey:slot.key,slotLabel:slot.label});
    used.add(pick.id);remCal-=pick.cal;remProt-=pick.p;
  }
  return plan;
}

function swapMeal(plan,idx,pr,favs=new Set()){
  const cur=plan[idx],used=new Set(plan.map(m=>m.id));
  const fm=filterMeals(pr);const slots=SLOTS[pr.numMeals]||SLOTS[4];
  let cands=fm.filter(m=>m.t.some(t=>{const sl=slots.find(s=>s.key===cur.slotKey);return sl&&sl.types.includes(t);})&&!used.has(m.id));
  if(!cands.length)cands=fm.filter(m=>m.id!==cur.id);
  const oCal=plan.reduce((s,m,i)=>i===idx?s:s+m.cal,0);
  const oProt=plan.reduce((s,m,i)=>i===idx?s:s+m.p,0);
  const tc=pr.calorieTarget-oCal,tp=pr.proteinTarget-oProt;
  const scored=cands.map(m=>({m,s:scoreM(m,tc,tp,favs)})).sort((a,b)=>a.s-b.s);
  const topN=Math.min(4,scored.length);
  const pick=scored[Math.floor(Math.random()*topN)].m;
  const np=[...plan];np[idx]={...pick,slotKey:cur.slotKey,slotLabel:cur.slotLabel};return np;
}

function genWeek(pr,favs=new Set()){
  const wk=[],recent=new Set();
  for(let d=0;d<7;d++){const dp=genDay(pr,favs,recent);wk.push(dp);dp.forEach(m=>recent.add(m.id));if(d>=2)wk[d-2].forEach(m=>recent.delete(m.id));}
  return wk;
}

function calcTotals(plan){return plan.reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p,cb:a.cb+m.cb,f:a.f+m.f}),{cal:0,p:0,cb:0,f:0});}
function devColor(actual,target){if(!target)return'green';const pct=Math.abs(actual-target)/target;return pct<=.1?'green':pct<=.2?'yellow':'red';}
function buildGrocery(wp){const im=new Map();wp.forEach(dp=>dp.forEach(m=>m.ig.forEach(ig=>{const k=ig.toLowerCase().trim();im.set(k,(im.get(k)||0)+1);})));return[...im.entries()].sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count}));}

function getFilteredBoosters(pr){
  return BOOSTERS.filter(b=>{
    if(pr.dietType==='vegetarian'&&!b.v)return false;
    if(pr.dietType==='eggetarian'&&!b.v)return false;
    if(!pr.dairyOk&&b.dairy)return false;
    if(!pr.soyOk&&b.soy)return false;
    return true;
  });
}

const PK='np2_prefs',FK='np2_favs',AK='np2_apikey',OK='np2_onboarded';
function loadP(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):null;}catch{return null;}}
function saveP(p){localStorage.setItem(PK,JSON.stringify(p));}
function loadF(){try{const r=localStorage.getItem(FK);return r?new Set(JSON.parse(r)):new Set();}catch{return new Set();}}
function saveF(s){localStorage.setItem(FK,JSON.stringify([...s]));}
function loadAPI(){return localStorage.getItem(AK)||'';}
function saveAPI(k){localStorage.setItem(AK,k);}
function isOnboarded(){return localStorage.getItem(OK)==='1';}
function setOnboarded(){localStorage.setItem(OK,'1');}

  return(
    <div className="bg-white rounded-xl border border-cream-200 shadow-sm p-4 anim-si">

// ── Macro Chart ──
function MacroChart({plan}){
  const canvasRef=useRef(null);const chartRef=useRef(null);const t=calcTotals(plan);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const pCal=t.p*4,cCal=t.cb*4,fCal=t.f*9,tot=pCal+cCal+fCal||1;
    chartRef.current=new Chart(canvasRef.current,{type:'doughnut',data:{labels:[`Protein ${Math.round(pCal/tot*100)}%`,`Carbs ${Math.round(cCal/tot*100)}%`,`Fat ${Math.round(fCal/tot*100)}%`],datasets:[{data:[pCal,cCal,fCal],backgroundColor:['#4A7C59','#3B82F6','#F59E0B'],borderColor:['#FFFBF5','#FFFBF5','#FFFBF5'],borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:12,usePointStyle:true,pointStyleWidth:8,font:{size:11,family:'Inter'},color:'#2D1810'}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[t.p,t.cb,t.f]);
  return(
    <div className="bg-white rounded-xl border border-cream-200 shadow-sm p-4 anim-si">
      <h3 className="text-xs font-bold text-bark-500 uppercase tracking-wider mb-3 text-center">Macro Split</h3>
      <div style={{height:'200px'}}><canvas ref={canvasRef}/></div>
      <div className="grid grid-cols-3 gap-2 mt-3 text-center">
        <div><div className="text-sm font-bold text-forest-600">{t.p}g</div><div className="text-[10px] text-bark-400">Protein</div></div>
        <div><div className="text-sm font-bold text-blue-500">{t.cb}g</div><div className="text-[10px] text-bark-400">Carbs</div></div>
        <div><div className="text-sm font-bold text-amber-500">{t.f}g</div><div className="text-[10px] text-bark-400">Fat</div></div>
      </div>
    </div>
  );
}

// ── Bridge the Gap Panel ──
function BridgeTheGap({plan,prefs}){
  const t=calcTotals(plan);
  const gap=prefs.proteinTarget-t.p;
  if(gap<=5)return(<div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center anim-si"><span className="text-lg">🎯</span><p className="text-sm font-bold text-emerald-700 mt-1">You've hit your protein target!</p><p className="text-xs text-emerald-600">{t.p}g of {prefs.proteinTarget}g — great job!</p></div>);

  const boosters=getFilteredBoosters(prefs);
  // Pick boosters that together bridge the gap
  const selected=[];let remaining=gap;
  for(const b of boosters){
    if(remaining<=0)break;
    if(b.extraP<=remaining+5){selected.push(b);remaining-=b.extraP;}
  }

  return(
    <div className="bg-gradient-to-br from-spice-50 to-cream-100 border-2 border-spice-300 rounded-xl p-4 anim-si">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-2xl">💪</span>
        <div>
          <h3 className="font-bold text-bark-700 text-sm">Bridge the Protein Gap</h3>
          <p className="text-xs text-spice-600">You need <strong>{gap}g more protein</strong> to hit your {prefs.proteinTarget}g target</p>
        </div>
      </div>
      <div className="space-y-2">
        {selected.map((b,i)=>(
          <div key={b.id} className="flex items-center gap-3 bg-white rounded-lg p-3 border border-cream-200 anim-fiu" style={{animationDelay:`${i*0.05}s`}}>
            <div className="w-8 h-8 rounded-full bg-forest-50 flex items-center justify-center text-forest-600 font-bold text-xs">+{b.extraP}g</div>
            <div className="flex-1">
              <p className="text-sm font-medium text-bark-700">{b.text}</p>
              <p className="text-[10px] text-bark-400">+{b.extraCal} cal</p>
            </div>
          </div>
        ))}
      </div>
      {/* Protein Swaps */}
      <div className="mt-4 pt-3 border-t border-spice-200">
        <h4 className="text-xs font-bold text-bark-600 uppercase tracking-wider mb-2">🔄 Smart Protein Swaps</h4>
        <div className="space-y-1.5">
          {SWAPS.slice(0,4).map((sw,i)=>(
            <div key={i} className="flex items-center gap-2 text-xs">
              <span className="text-bark-400 line-through">{sw.from}</span>
              <span className="text-forest-500">→</span>
              <span className="text-bark-700 font-medium">{sw.to}</span>
              <span className="text-forest-600 font-bold ml-auto">+{sw.extraP}g</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

            <button onClick={onClose} className="p-1.5 text-bark-400 hover:text-bark-600 hover:bg-cream-200 rounded-lg">✕</button>

          <input type="text" placeholder="Search products..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full px-3 py-2 text-sm border border-cream-200 rounded-lg bg-white focus:outline-none focus:border-forest-400"/>
          <div className="flex gap-1.5 mt-2 overflow-x-auto scrollbar-hide">
            {[{k:'all',l:'All'},...Object.entries(BLINKIT_CATS).map(([k,l])=>({k,l}))].map(o=>(
              <button key={o.k} onClick={()=>setCat(o.k)} className={`flex-shrink-0 px-2.5 py-1 text-[10px] font-semibold rounded-full border transition-all ${cat===o.k?'bg-forest-500 text-white border-forest-500':'bg-white text-bark-500 border-cream-200'}`}>{o.l}</button>
            ))}
          </div>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-2">
          {filtered.map(b=>(
            <div key={b.id} className="bg-white rounded-lg p-3 border border-cream-200 flex items-center gap-3">
              <div className="w-12 h-12 rounded-lg bg-forest-50 flex items-center justify-center">
                <span className="text-forest-600 font-extrabold text-sm">{b.p}g</span>
              </div>
              <div className="flex-1 min-w-0">
                <h4 className="text-sm font-semibold text-bark-700 truncate">{b.n}</h4>
                <p className="text-[10px] text-bark-400">{b.brand} · {b.serve} · {b.cal} cal</p>
                <p className="text-[10px] text-spice-600 font-medium">{b.price}</p>
              </div>
              <div className="text-right">
                <div className="text-xs font-bold text-forest-600">{b.p}g P</div>
                <div className="text-[10px] text-bark-400">{b.cb}g C · {b.f}g F</div>
              </div>
            </div>
          ))}
          {filtered.length===0&&<p className="text-center text-sm text-bark-400 py-8">No products found matching your filters.</p>}
        </div>
      </div>
    </div>
  );
}

// ── Photo Scanner ──
function PhotoScanner({onClose}){
  const[apiKey,setApiKey]=useState(loadAPI);
  const[img,setImg]=useState(null);
  const[preview,setPreview]=useState('');
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const fileRef=useRef(null);

  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    setImg(file);setResult(null);setError('');
    const reader=new FileReader();
    reader.onload=ev=>setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const analyze=async()=>{
    if(!apiKey){setError('Please enter your Claude API key');return;}
    if(!preview){setError('Please upload a photo first');return;}
    saveAPI(apiKey);setLoading(true);setError('');
    try{
      const base64=preview.split(',')[1];
      const mediaType=img.type||'image/jpeg';
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Analyze this food photo. Return ONLY a JSON object with these fields: {"name": "meal name", "description": "brief description", "calories": number, "protein": number in grams, "carbs": number in grams, "fat": number in grams, "serving": "estimated portion size"}. Be accurate with Indian food portions. Return ONLY the JSON, no other text.'}
          ]}],
        }),
      });
      if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API error');}
      const data=await resp.json();
      const text=data.content[0].text;
      const json=JSON.parse(text.replace(/```json\n?/,'').replace(/```/,''));
      setResult(json);
    }catch(err){
      setError(err.message||'Failed to analyze. Check your API key and try again.');
    }
    setLoading(false);
  };

  return(
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4 anim-fi" onClick={onClose}>
      <div className="bg-cream-50 rounded-t-2xl sm:rounded-2xl w-full max-w-md max-h-[85vh] flex flex-col shadow-2xl anim-fiu" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-cream-200">
          <h2 className="font-bold text-bark-700 text-lg">📸 Scan Your Meal</h2>
          <button onClick={onClose} className="p-1.5 text-bark-400 hover:text-bark-600 rounded-lg">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-4">
          <div>
            <label className="block text-xs font-bold text-bark-500 mb-1">Claude API Key <span className="font-normal text-bark-400">(stored locally)</span></label>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." className="w-full px-3 py-2 text-sm border border-cream-200 rounded-lg bg-white focus:outline-none focus:border-forest-400"/>
          </div>
          <div className="border-2 border-dashed border-cream-200 rounded-xl p-6 text-center cursor-pointer hover:border-forest-300 transition-colors" onClick={()=>fileRef.current?.click()}>
            {preview?<img src={preview} className="max-h-48 mx-auto rounded-lg"/>:<><div className="text-4xl mb-2">📷</div><p className="text-sm text-bark-400">Tap to upload a meal photo</p></>}
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden"/>
          </div>
          <button onClick={analyze} disabled={loading} className="w-full py-3 rounded-xl bg-gradient-to-r from-forest-500 to-forest-600 text-white font-bold shadow-lg hover:shadow-xl transition-all disabled:opacity-60">
            {loading?<span className="flex items-center justify-center gap-2"><svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Analyzing...</span>:'🔍 Analyze Meal'}
          </button>
          {error&&<div className="bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-600">{error}</div>}
          {result&&(
            <div className="bg-white rounded-xl border border-cream-200 p-4 anim-si">
              <h3 className="font-bold text-bark-700 text-lg">{result.name}</h3>
              <p className="text-xs text-bark-400 mb-3">{result.description}</p>
              <p className="text-xs text-bark-500 mb-3">📏 Serving: {result.serving}</p>
              <div className="grid grid-cols-4 gap-2 text-center">
                <div className="bg-spice-50 rounded-lg p-2"><div className="text-lg font-bold text-spice-600">{result.calories}</div><div className="text-[10px] text-bark-400">Cal</div></div>
                <div className="bg-forest-50 rounded-lg p-2"><div className="text-lg font-bold text-forest-600">{result.protein}g</div><div className="text-[10px] text-bark-400">Protein</div></div>
                <div className="bg-blue-50 rounded-lg p-2"><div className="text-lg font-bold text-blue-500">{result.carbs}g</div><div className="text-[10px] text-bark-400">Carbs</div></div>
                <div className="bg-amber-50 rounded-lg p-2"><div className="text-lg font-bold text-amber-500">{result.fat}g</div><div className="text-[10px] text-bark-400">Fat</div></div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Grocery List ──
function GroceryList({weekPlan,onClose}){
  const[checked,setChecked]=useState(new Set());
  const items=useMemo(()=>buildGrocery(weekPlan),[weekPlan]);
  const tog=n=>setChecked(p=>{const nx=new Set(p);nx.has(n)?nx.delete(n):nx.add(n);return nx;});
  const copy=()=>{const txt=items.map(i=>`${checked.has(i.name)?'✅':'⬜'} ${i.name} (×${i.count})`).join('\n');navigator.clipboard.writeText(`🛒 Weekly Grocery List\n\n${txt}`);};
  return(
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4 anim-fi" onClick={onClose}>
      <div className="bg-cream-50 rounded-t-2xl sm:rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl anim-fiu" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-cream-200">
          <h2 className="font-bold text-bark-700 text-lg">🛒 Grocery List</h2>
          <div className="flex gap-2"><button onClick={copy} className="px-3 py-1.5 text-xs font-medium bg-forest-50 text-forest-600 rounded-lg border border-forest-200">📋 Copy</button><button onClick={onClose} className="p-1.5 text-bark-400 hover:text-bark-600 rounded-lg">✕</button></div>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-1">
          {items.map(i=>(<label key={i.name} className={`flex items-center gap-3 p-2.5 rounded-lg cursor-pointer transition-all ${checked.has(i.name)?'bg-forest-50 border border-forest-200':'bg-white border border-cream-200'}`}><input type="checkbox" checked={checked.has(i.name)} onChange={()=>tog(i.name)} className="w-4 h-4 rounded text-forest-500"/><span className={`flex-1 text-sm ${checked.has(i.name)?'line-through text-bark-400':'text-bark-700'}`}>{i.name}</span><span className="text-[10px] text-bark-400 bg-cream-100 px-1.5 py-0.5 rounded">×{i.count}</span></label>))}
        </div>
      </div>
    </div>
  );
}

// ── Weekly View ──
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
function WeeklyView({weekPlan,prefs,onSwapMeal,favorites,onToggleFav}){
  const[ad,setAd]=useState(0);
  if(!weekPlan||!weekPlan.length)return null;
  const dp=weekPlan[ad];
  return(
    <div className="space-y-4">
      <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        {weekPlan.map((day,i)=>{const t=calcTotals(day),cd=Math.abs(t.cal-prefs.calorieTarget)/prefs.calorieTarget,dc=cd<=.1?'bg-emerald-400':cd<=.2?'bg-amber-400':'bg-red-400';
          return(<button key={i} onClick={()=>setAd(i)} className={`flex-shrink-0 px-4 py-2.5 rounded-lg text-center border transition-all ${i===ad?'bg-forest-500 text-white border-forest-500':'bg-white text-bark-500 border-cream-200'}`}><div className="text-xs font-bold">{DAYS[i].slice(0,3)}</div><div className="flex items-center justify-center gap-1 mt-0.5"><span className={`w-1.5 h-1.5 rounded-full ${i===ad?'bg-white':dc}`}/><span className={`text-[10px] ${i===ad?'text-forest-100':'text-bark-400'}`}>{t.p}g P</span></div></button>);
        })}
      </div>
      <h3 className="font-bold text-bark-700 text-lg">{DAYS[ad]}</h3>
      <DaySummary plan={dp} prefs={prefs}/>
      {prefs.proteinGapMode&&<BridgeTheGap plan={dp} prefs={prefs}/>}
      <div className="grid gap-3">{dp.map((meal,i)=>(<MealCard key={`${ad}-${meal.id}-${i}`} meal={meal} index={i} onSwap={()=>onSwapMeal(ad,i)} onToggleFav={()=>onToggleFav(meal.id)} isFav={favorites.has(meal.id)}/>))}</div>
    </div>
  );
}

// ── Sidebar Filters (compact) ──
function Sidebar({prefs,setPrefs,onGenerate,isGen}){
  const upd=(k,v)=>setPrefs(p=>({...p,[k]:v}));
  return(
    <div className="space-y-4">
      <div>
        <label className="block text-xs font-bold text-bark-500 mb-1">Calories — <span className="text-spice-500">{prefs.calorieTarget}</span></label>
        <input type="range" min={1200} max={3500} step={50} value={prefs.calorieTarget} onChange={e=>upd('calorieTarget',+e.target.value)} className="w-full"/>
      </div>
      <div>
        <label className="block text-xs font-bold text-bark-500 mb-1">💪 Protein — <span className="text-forest-600 font-extrabold">{prefs.proteinTarget}g</span></label>
        <input type="range" min={50} max={250} step={5} value={prefs.proteinTarget} onChange={e=>upd('proteinTarget',+e.target.value)} className="w-full"/>
      </div>
      <div>
        <label className="block text-xs font-bold text-bark-500 mb-1">Diet</label>
        <div className="flex gap-1">{['vegetarian','eggetarian','non-vegetarian'].map(d=>(<button key={d} onClick={()=>upd('dietType',d)} className={`flex-1 py-1.5 text-[10px] font-semibold rounded-lg border transition-all ${prefs.dietType===d?'bg-forest-500 text-white border-forest-500':'bg-white text-bark-500 border-cream-200'}`}>{d==='vegetarian'?'Veg':d==='eggetarian'?'Egg':'Non-Veg'}</button>))}</div>
      </div>
      <div>
        <label className="block text-xs font-bold text-bark-500 mb-1">Meals</label>
        <div className="flex gap-1">{[3,4,5,6].map(n=>(<button key={n} onClick={()=>upd('numMeals',n)} className={`flex-1 py-1.5 text-sm font-bold rounded-lg border transition-all ${prefs.numMeals===n?'bg-forest-500 text-white border-forest-500':'bg-white text-bark-500 border-cream-200'}`}>{n}</button>))}</div>
      </div>
      <div className="grid grid-cols-2 gap-1">
        {CUISINES.slice(0,10).map(c=>(<button key={c.id} onClick={()=>setPrefs(p=>{if(c.id==='mixed')return{...p,cuisines:['mixed']};let nx=p.cuisines.filter(x=>x!=='mixed');nx=nx.includes(c.id)?nx.filter(x=>x!==c.id):[...nx,c.id];return{...p,cuisines:nx.length?nx:['mixed']};})} className={`py-1.5 px-2 text-[10px] font-medium rounded-lg border truncate ${prefs.cuisines.includes(c.id)?'bg-spice-50 text-spice-700 border-spice-300':'bg-white text-bark-500 border-cream-200'}`}>{c.emoji} {c.label.replace('Indian — ','')}</button>))}
      </div>
      <button onClick={onGenerate} disabled={isGen} className="w-full py-3 rounded-xl bg-gradient-to-r from-forest-500 to-forest-600 text-white font-bold shadow-lg hover:shadow-xl transition-all active:scale-[0.98] disabled:opacity-60">
        {isGen?'Generating...':'✨ Generate Plan'}
      </button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════
function App(){
  const[prefs,setPrefs]=useState(()=>loadP()||DEFAULT_PREFS);
  const[onboarded,setOnboarded2]=useState(isOnboarded);
  const[dayPlan,setDayPlan]=useState(null);
  const[weekPlan,setWeekPlan]=useState(null);
  const[favorites,setFavorites]=useState(()=>loadF());
  const[viewMode,setViewMode]=useState('day');
  const[showGrocery,setShowGrocery]=useState(false);
  const[showBlinkit,setShowBlinkit]=useState(false);
  const[showScanner,setShowScanner]=useState(false);
  const[isGen,setIsGen]=useState(false);
  const[mobFilters,setMobFilters]=useState(false);
  const planRef=useRef(null);

  useEffect(()=>{saveP(prefs);},[prefs]);
  useEffect(()=>{saveF(favorites);},[favorites]);

  const toggleFav=useCallback(id=>setFavorites(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}),[]);

  const handleGen=useCallback(()=>{
    setIsGen(true);
    setTimeout(()=>{
      if(viewMode==='day')setDayPlan(genDay(prefs,favorites));
      else setWeekPlan(genWeek(prefs,favorites));
      setIsGen(false);setMobFilters(false);
      setTimeout(()=>planRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),100);
    },300);
  },[prefs,favorites,viewMode]);

  const handleSwapDay=useCallback(i=>{if(dayPlan)setDayPlan(p=>swapMeal(p,i,prefs,favorites));},[dayPlan,prefs,favorites]);
  const handleSwapWeek=useCallback((d,i)=>{if(weekPlan)setWeekPlan(p=>{const n=[...p];n[d]=swapMeal(n[d],i,prefs,favorites);return n;});},[weekPlan,prefs,favorites]);

  const handleSave=async()=>{
    try{const el=planRef.current;if(!el)return;const canvas=await html2canvas(el,{backgroundColor:'#FFFBF5',scale:2});const link=document.createElement('a');link.download=`meal-plan-${new Date().toISOString().slice(0,10)}.png`;link.href=canvas.toDataURL();link.click();}
    catch{const plan=viewMode==='day'?dayPlan:(weekPlan?.[0]||[]);const txt=plan.map(m=>`${m.slotLabel}: ${m.n} (${m.cal}cal, ${m.p}g P)\n  ${m.s}`).join('\n\n');navigator.clipboard.writeText(`💪 NourishPlan Pro\n\n${txt}`);alert('Copied to clipboard!');}
  };

  const handleOnboard=(p)=>{setPrefs(p);setOnboarded2(true);};

  // Auto-generate on first visit after onboarding
  useEffect(()=>{
    if(onboarded&&!dayPlan&&!weekPlan){
      setTimeout(()=>{setDayPlan(genDay(prefs,favorites));},200);
    }
  },[onboarded]);

  if(!onboarded)return <Onboarding onComplete={handleOnboard}/>;

  const hasPlan=viewMode==='day'?!!dayPlan:!!weekPlan;

  return(
    <div className="min-h-screen bg-cream-100">
      <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-cream-200 shadow-sm">
        <div className="max-w-6xl mx-auto px-4 py-2.5 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-2xl">💪</span>
            <div><h1 className="text-base font-extrabold text-bark-700 tracking-tight">NourishPlan <span className="text-forest-500">Pro</span></h1><p className="text-[9px] text-bark-400 -mt-0.5">Protein-First Meal Planner</p></div>
          </div>
          <div className="flex items-center gap-1.5">
            <button onClick={()=>setShowScanner(true)} className="px-2.5 py-1.5 text-xs font-semibold bg-pro-50 text-pro-600 rounded-lg border border-pro-200 hover:bg-pro-100 transition-all hidden sm:block">📸 Scan</button>
            <button onClick={()=>setShowBlinkit(true)} className="px-2.5 py-1.5 text-xs font-semibold bg-forest-50 text-forest-600 rounded-lg border border-forest-200 hover:bg-forest-100 transition-all hidden sm:block">🛒 Protein Store</button>
            <div className="hidden sm:flex bg-cream-100 rounded-lg p-0.5 border border-cream-200">
              {['day','week'].map(m=>(<button key={m} onClick={()=>setViewMode(m)} className={`px-3 py-1 text-xs font-semibold rounded-md transition-all ${viewMode===m?'bg-white text-forest-600 shadow-sm':'text-bark-400'}`}>{m==='day'?'📅 Day':'📆 Week'}</button>))}
            </div>
            <button onClick={()=>setMobFilters(!mobFilters)} className="lg:hidden px-2.5 py-1.5 text-xs font-semibold bg-cream-100 text-bark-600 rounded-lg border border-cream-200">⚙️</button>
          </div>
        </div>
        <div className="sm:hidden flex justify-center pb-2 gap-1">
          <button onClick={()=>setShowScanner(true)} className="px-3 py-1 text-[10px] font-semibold bg-pro-50 text-pro-600 rounded-full">📸 Scan</button>
          <button onClick={()=>setShowBlinkit(true)} className="px-3 py-1 text-[10px] font-semibold bg-forest-50 text-forest-600 rounded-full">🛒 Store</button>
          {['day','week'].map(m=>(<button key={m} onClick={()=>setViewMode(m)} className={`px-3 py-1 text-[10px] font-semibold rounded-full ${viewMode===m?'bg-forest-500 text-white':'bg-cream-100 text-bark-400'}`}>{m==='day'?'📅 Day':'📆 Week'}</button>))}
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">
        <div className="flex flex-col lg:flex-row gap-6">
          <aside className={`lg:w-72 flex-shrink-0 ${mobFilters?'block':'hidden lg:block'}`}>
            <div className="lg:sticky lg:top-24 bg-white rounded-2xl border border-cream-200 shadow-sm p-4">
              <h2 className="text-xs font-bold text-bark-600 mb-3 flex items-center gap-2">⚙️ Preferences</h2>
              <Sidebar prefs={prefs} setPrefs={setPrefs} onGenerate={handleGen} isGen={isGen}/>
            </div>
          </aside>

          <div className="flex-1 min-w-0">
            {!hasPlan?(
              <div className="flex flex-col items-center justify-center py-20 text-center">
                <div className="text-6xl mb-4">💪</div>
                <h2 className="text-xl font-bold text-bark-700 mb-2">Your protein-optimized plan is coming...</h2>
                <div className="shimmer w-48 h-4 rounded mt-2"/>
              </div>
            ):(
              <div ref={planRef} className="space-y-4">
                <div className="flex items-center justify-between flex-wrap gap-2">
                  <h2 className="text-lg font-bold text-bark-700">{viewMode==='day'?'📅 Your Day Plan':'📆 Weekly Plan'}</h2>
                  <div className="flex gap-2 flex-wrap">
                    <button onClick={handleGen} className="px-3 py-1.5 text-xs font-semibold bg-spice-50 text-spice-600 rounded-lg border border-spice-200">🔄 Regenerate</button>
                    {viewMode==='week'&&weekPlan&&<button onClick={()=>setShowGrocery(true)} className="px-3 py-1.5 text-xs font-semibold bg-forest-50 text-forest-600 rounded-lg border border-forest-200">🛒 Grocery</button>}
                    <button onClick={handleSave} className="px-3 py-1.5 text-xs font-semibold bg-blue-50 text-blue-600 rounded-lg border border-blue-200">💾 Save</button>
                  </div>
                </div>

                {viewMode==='day'&&dayPlan&&(
                  <>
                    <DaySummary plan={dayPlan} prefs={prefs}/>
                    {prefs.proteinGapMode&&<BridgeTheGap plan={dayPlan} prefs={prefs}/>}
                    <div className="grid gap-3 lg:grid-cols-2">
                      <div className="lg:col-span-2"><MacroChart plan={dayPlan}/></div>
                      {dayPlan.map((meal,i)=>(<MealCard key={`${meal.id}-${i}`} meal={meal} index={i} onSwap={()=>handleSwapDay(i)} onToggleFav={()=>toggleFav(meal.id)} isFav={favorites.has(meal.id)}/>))}
                    </div>
                  </>
                )}
                {viewMode==='week'&&weekPlan&&<WeeklyView weekPlan={weekPlan} prefs={prefs} onSwapMeal={handleSwapWeek} favorites={favorites} onToggleFav={toggleFav}/>}
              </div>
            )}
          </div>
        </div>
      </main>

      {showGrocery&&weekPlan&&<GroceryList weekPlan={weekPlan} onClose={()=>setShowGrocery(false)}/>}
      {showBlinkit&&<BlinkitStore prefs={prefs} onClose={()=>setShowBlinkit(false)}/>}
      {showScanner&&<PhotoScanner onClose={()=>setShowScanner(false)}/>}
      <footer className="text-center py-6 text-xs text-bark-400 border-t border-cream-200 mt-8">NourishPlan Pro — Protein-first planning. All data stored locally.</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
